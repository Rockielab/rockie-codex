name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run smoke suite
        run: bash tests/smoke-test.sh

      - name: Install attribution test dependencies
        if: matrix.os == 'ubuntu-latest'
        run: python -m pip install pytest PyYAML

      - name: Guard community skill attribution
        if: matrix.os == 'ubuntu-latest'
        run: python -m pytest tests/test_skill_attribution_preservation.py
